apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: wil-app
  name: wil-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wil-app
  strategy: {}
  template:
    metadata:
      labels:
        app: wil-app
    spec:
      containers:
      - image: wil42/playground:v2
        name: wil-app
        ports:
          - name: http
            containerPort: 8888
            protocol: TCP
        resources: {}
status: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wil-app-service
spec:
  selector:
    app: wil-app
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8888
